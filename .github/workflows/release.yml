name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0). Leave blank to build current commit as a draft.'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="dev-${GITHUB_SHA::7}"
          fi
          # Strip leading "v" for CFBundleShortVersionString.
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then VERSION="0.0.0-dev"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building tag=$TAG version=$VERSION"

      - name: Build universal binary (arm64 + x86_64)
        run: |
          swift build -c release --arch arm64 --arch x86_64
          BIN=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/ClaudeSessionMonitor
          file "$BIN"
          echo "BIN=$BIN" >> "$GITHUB_ENV"

      - name: Inject version into Info.plist
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.ver.outputs.version }}" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER:-1}" Resources/Info.plist
          /usr/libexec/PlistBuddy -c "Print" Resources/Info.plist

      - name: Assemble ClaudeSessionMonitor.app
        run: |
          APP=ClaudeSessionMonitor.app
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "$BIN" "$APP/Contents/MacOS/ClaudeSessionMonitor"
          cp Resources/Info.plist "$APP/Contents/Info.plist"
          codesign --force --deep --sign - "$APP"
          codesign -dv "$APP" 2>&1 || true

      - name: Zip the bundle
        id: zip
        run: |
          ZIP="ClaudeSessionMonitor-${{ steps.ver.outputs.tag }}.zip"
          ditto -c -k --keepParent ClaudeSessionMonitor.app "$ZIP"
          shasum -a 256 "$ZIP" > "$ZIP.sha256"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          ls -la "$ZIP" "$ZIP.sha256"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeSessionMonitor-${{ steps.ver.outputs.tag }}
          path: |
            ${{ steps.zip.outputs.zip }}
            ${{ steps.zip.outputs.zip }}.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.zip.outputs.zip }}
            ${{ steps.zip.outputs.zip }}.sha256
          body: |
            ## Install

            1. Download `${{ steps.zip.outputs.zip }}` below and unzip it.
            2. Move `ClaudeSessionMonitor.app` to `/Applications`.
            3. **First launch:** right-click the app → *Open* → *Open* (because the build is ad-hoc signed, not notarized).
            4. Grant the notification permission prompt.
            5. Optional: add to *System Settings → General → Login Items* so it starts automatically.

            ## Verify the download

            ```
            shasum -a 256 -c ${{ steps.zip.outputs.zip }}.sha256
            ```

            ## Requirements on your Mac

            - macOS 13 or newer
            - Node.js installed (any LTS) — the app shells out to [`ccusage`](https://github.com/ryoppippi/ccusage) via `npx`. To skip the npx warm-up: `npm i -g ccusage`.
